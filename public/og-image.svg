<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Alex+Brush&amp;display=swap');
      
      .text-sans {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      .text-display {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      }
      .text-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      .text-signature {
        font-family: 'Alex Brush', cursive;
      }
    </style>

    <!-- Deep Luxury Black Background -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070709" />
      <stop offset="100%" stop-color="#0B0B0E" />
    </linearGradient>

    <!-- Metallic Gold Gradient for High-End Highlights -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E5A93B" />
      <stop offset="50%" stop-color="#F3C067" />
      <stop offset="100%" stop-color="#E5A93B" />
    </linearGradient>

    <!-- Portrait Clip Path matching homepage rounding -->
    <clipPath id="portrait-clip">
      <rect x="706" y="76" width="388" height="478" rx="24" />
    </clipPath>
  </defs>

  <!-- Background Base -->
  <rect width="1200" height="630" fill="url(#bg-grad)" />

  <!-- LEFT COLUMN: BRANDING & TYPOGRAPHY -->
  <g transform="translate(80, 0)">
    
    <!-- Identity / Category Label -->
    <text x="0" y="115" fill="#71717A" class="text-mono" font-size="10" font-weight="700" letter-spacing="4.5">SAAD'S LAB • DIGITAL IDENTITY</text>

    <!-- Signature Block: Alex Brush Font -->
    <text x="0" y="180" fill="#E5A93B" class="text-signature" font-size="44" font-weight="400">Ahmad Saad</text>

    <!-- Headline: UI/UX Designer (White) -->
    <text x="0" y="260" fill="#FFFFFF" class="text-display" font-size="60" font-weight="700" letter-spacing="-1.5">UI/UX DESIGNER</text>

    <!-- Headline: Digital Creator (Gold Gradient) -->
    <text x="0" y="325" fill="url(#gold-grad)" class="text-display" font-size="60" font-weight="700" letter-spacing="-1.5">DIGITAL CREATOR</text>

    <!-- Sub-tagline / Core Competencies -->
    <text x="0" y="380" fill="#A1A1AA" class="text-mono" font-size="10" font-weight="500" letter-spacing="2.5">CREATIVE STRATEGY  •  HUMAN-CENTERED UX  •  VISUAL DESIGN</text>

    <!-- Divider Line -->
    <line x1="0" y1="430" x2="320" y2="430" stroke="#262626" stroke-width="1.5" />

    <!-- Website URL (Minimal text style) -->
    <text x="0" y="475" fill="#E5A93B" class="text-mono" font-size="12" font-weight="700" letter-spacing="3">WWW.SAADSLAB.ONLINE</text>
    
    <!-- Extra subtle indicator to match homepage bento style -->
    <text x="0" y="525" fill="#52525B" class="text-sans" font-size="12" font-weight="400">Portfolio &amp; Selected Works • 2026 Edition</text>

  </g>

  <!-- RIGHT COLUMN: THE PORTRAIT CONTAINER (Exact Homepage Image Card Replica) -->
  <g>
    <!-- Outer Card Frame (bg-zinc-950/90 border border-zinc-850) -->
    <rect x="690" y="60" width="420" height="510" rx="36" fill="#09090C" stroke="#262626" stroke-width="1.5" />

    <!-- Inner Micro Accent Line (border-brand-accent/25) -->
    <rect x="698" y="68" width="404" height="494" rx="28" fill="none" stroke="#E5A93B" stroke-opacity="0.2" stroke-width="1" />

    <!-- Masked Portrait Image -->
    <image href="https://www.saadslab.online/avatar.jpg" x="706" y="76" width="388" height="478" preserveAspectRatio="xMidYMid slice" clip-path="url(#portrait-clip)" />

    <!-- Sleek inner frame to seal image edges cleanly -->
    <rect x="706" y="76" width="388" height="478" rx="24" fill="none" stroke="#262626" stroke-width="1" />
  </g>

</svg>
