<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap');
      
      .text-sans {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      .text-display {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      }
    </style>

    <!-- Premium Soft Light Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFDFD" />
      <stop offset="100%" stop-color="#F5F5F7" />
    </linearGradient>

    <!-- Soft ambient blur in top-left corner matching visual reference -->
    <radialGradient id="corner-blur" cx="10%" cy="10%" r="50%">
      <stop offset="0%" stop-color="#EBE3D5" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#FDFDFD" stop-opacity="0" />
    </radialGradient>

    <!-- Extremely Soft Card Drop Shadow for a High-End Look -->
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#18181B" flood-opacity="0.06" />
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#18181B" flood-opacity="0.03" />
    </filter>

    <!-- Soft Pill Shadow -->
    <filter id="pill-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.05" />
    </filter>

    <!-- Clip Path for the Rotated Portrait Card -->
    <clipPath id="portrait-clip">
      <rect x="12" y="12" width="356" height="456" rx="24" />
    </clipPath>
  </defs>

  <!-- Background Base -->
  <rect width="1200" height="630" fill="url(#bg-grad)" />
  
  <!-- Ambient Warm Top-Left Blur -->
  <rect width="1200" height="630" fill="url(#corner-blur)" />

  <!-- LEFT COLUMN: ROTATED PORTRAIT CARD (Center-rotated at -4.5 degrees) -->
  <g transform="translate(100, 75) rotate(-4.5, 190, 240)">
    <!-- Main Card Body -->
    <rect x="0" y="0" width="380" height="480" rx="36" fill="#FFFFFF" stroke="#E4E4E7" stroke-width="1.5" filter="url(#card-shadow)" />
    
    <!-- Masked Portrait Image -->
    <image href="https://www.saadslab.online/avatar.jpg" x="12" y="12" width="356" height="456" preserveAspectRatio="xMidYMid slice" clip-path="url(#portrait-clip)" />
    
    <!-- Crisp Inner Stroke for Premium Edge Definition -->
    <rect x="12" y="12" width="356" height="456" rx="24" fill="none" stroke="#000000" stroke-opacity="0.03" stroke-width="1" />
  </g>

  <!-- RIGHT COLUMN: MINIMALIST BRANDING & TYPOGRAPHY -->
  <g transform="translate(565, 0)">
    
    <!-- Light Grey Website Pill -->
    <g transform="translate(0, 142)">
      <rect width="195" height="36" rx="18" fill="#E4E4E7" fill-opacity="0.65" />
      <text x="97.5" y="22" fill="#3F3F46" class="text-sans" font-size="13" font-weight="500" text-anchor="middle">www.saadslab.online</text>
    </g>

    <!-- Header Typography Stack -->
    <text x="0" y="252" fill="#09090B" class="text-display" font-size="52" font-weight="700" letter-spacing="-1.5">Ahmad Saad</text>
    <text x="0" y="312" fill="#09090B" class="text-display" font-size="44" font-weight="700" letter-spacing="-1">UI/UX Designer</text>
    <text x="0" y="372" fill="#09090B" class="text-display" font-size="44" font-weight="700" letter-spacing="-1">Digital Creator</text>

    <!-- Clean Premium Black Pill -->
    <g transform="translate(0, 428)">
      <rect width="320" height="42" rx="21" fill="#09090B" filter="url(#pill-shadow)" />
      <text x="160" y="26" fill="#FFFFFF" class="text-sans" font-size="13.5" font-weight="500" letter-spacing="0.3" text-anchor="middle">UI/UX • Product Design • Snapchat AR</text>
    </g>

  </g>

</svg>
